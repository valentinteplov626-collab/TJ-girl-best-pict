    <style>
        .background-grid {
            display: flex;
            flex-direction: column; 
            gap: 15px; 
            padding: 10px;
            width: 100%;
            max-width: 500px; 
            margin: 0 auto;
        }
        .image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; 
            overflow: hidden;
            border-radius: 6px;
            background-color: #111;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        .image-container img.image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: filter 0.3s ease; 
        }

        /* Класс для размытия нижних картинок */
        .image-container img.image.blurred {
            filter: blur(5px) brightness(0.7); 
        }
        
        /* CSS-замена значка Play (иконка "Глаз") */
        .overlay-eye {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 60px; 
            height: 60px;
            background-color: rgba(0,0,0,0.5); 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            opacity: 0.9;
            pointer-events: none; /* Чтобы клик проходил насквозь на картинку */
        }

        .overlay-eye::before {
            content: '';
            position: absolute;
            width: 32px;
            height: 18px;
            background-color: white;
            border-radius: 50%;
        }

        .overlay-eye::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: black;
            border-radius: 50%;
            border: 2px solid white; 
        }
    </style>
